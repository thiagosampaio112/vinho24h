<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vinho 24 Horas · Gerador de QR Code das adegas</title>
  <style>
    :root { --bordo:#3d0a1f; --bordo-escuro:#2a0715; --vinho:#7d1935; --dourado:#d4a544; --dourado-claro:#f0d089; --texto:#f4e9df; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:"Segoe UI",system-ui,sans-serif; background:var(--bordo-escuro); color:var(--texto); padding:24px 16px; }
    .topo { max-width:900px; margin:0 auto 20px; text-align:center; }
    .topo h1 { color:var(--dourado-claro); font-size:22px; }
    .topo p { color:#c9a9b3; margin-top:6px; font-size:14px; }
    .topo code { background:#00000040; padding:2px 8px; border-radius:6px; color:var(--dourado-claro); }
    .acoes { text-align:center; margin:16px auto; }
    .btn { background:var(--dourado); color:var(--bordo-escuro); border:none; padding:11px 20px; border-radius:999px; font-weight:700; cursor:pointer; font-size:15px; }
    .btn:hover { filter:brightness(1.08); }

    .cartazes { max-width:900px; margin:24px auto; display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:24px; }

    /* O cartaz que vai na porta */
    .cartaz {
      background:linear-gradient(180deg,#4a1329,#2a0715);
      border:2px solid var(--dourado);
      border-radius:20px;
      padding:26px 22px 22px;
      text-align:center;
      display:flex; flex-direction:column; align-items:center; gap:14px;
    }
    .marca { font-size:26px; font-weight:800; letter-spacing:1px; }
    .marca .v { color:var(--dourado-claro); }
    .marca .h { color:var(--bordo-escuro); background:var(--dourado); padding:1px 8px; border-radius:6px; margin-left:4px; }
    .cartaz-frase { font-size:19px; font-weight:700; color:#fff; line-height:1.3; }
    .cartaz-sub { font-size:14px; color:#e8c9d3; }
    .qr-box { background:#fff; padding:14px; border-radius:14px; line-height:0; }
    .qr-box img { width:230px; height:230px; display:block; }
    .cartaz-adega { font-size:15px; color:var(--dourado-claro); font-weight:700; }
    .cartaz-passos { font-size:13px; color:#e8c9d3; }
    .baixar { margin-top:4px; }
    .baixar a { color:var(--dourado-claro); font-size:13px; text-decoration:underline; cursor:pointer; }

    @media print {
      body { background:#fff; padding:0; }
      .topo, .acoes { display:none; }
      .cartazes { display:block; }
      .cartaz { page-break-after:always; border:2px solid #7d1935; background:#fff; color:#2a0715; height:100vh; justify-content:center; }
      .marca .v { color:#7d1935; } .marca .h { background:#7d1935; color:#fff; }
      .cartaz-frase { color:#2a0715; } .cartaz-sub,.cartaz-passos { color:#5a1130; }
      .baixar { display:none; }
    }
  </style>
</head>
<body>
  <div class="topo">
    <h1>Cartazes de QR Code das adegas</h1>
    <p>Cada QR abre o guia já na adega certa. URL base do site: <code id="url-base"></code></p>
    <p>Se um dia o endereço do site mudar, edite a constante <code>URL_BASE</code> no topo deste arquivo.</p>
  </div>

  <div class="acoes">
    <button class="btn" onclick="window.print()">🖨️ Imprimir os cartazes</button>
  </div>

  <div class="cartazes" id="cartazes"></div>

  <script src="qrcode.js"></script>
  <script src="data.js"></script>
  <script>
    // ======================================================================
    //  URL do site publicado (GitHub Pages). Mude aqui se o endereço mudar.
    // ======================================================================
    const URL_BASE = "https://thiagosampaio112.github.io/vinho24h/";

    document.getElementById("url-base").textContent = URL_BASE;

    function gerarQR(url) {
      const qr = qrcode(0, "H");        // "H" = alta correção de erro (resiste a arranhões)
      qr.addData(url);
      qr.make();
      return qr.createDataURL(8, 4);    // PNG em data URL
    }

    const container = document.getElementById("cartazes");

    Object.entries(ADEGAS)
      .filter(([, info]) => info.ativa !== false)  // só unidades ativas
      .forEach(([slug, info]) => {
      const url = URL_BASE + "?adega=" + slug;
      const dataUrl = gerarQR(url);

      const card = document.createElement("div");
      card.className = "cartaz";
      card.innerHTML = `
        <div class="marca"><span class="v">VINHO</span><span class="h">24 HORAS</span></div>
        <div class="cartaz-frase">Não sabe qual garrafa escolher?</div>
        <div class="cartaz-sub">Aponte a câmera e descubra o vinho com a sua cara 🍷</div>
        <div class="qr-box"><img src="${dataUrl}" alt="QR Code ${info.nome}" /></div>
        <div class="cartaz-adega">${info.nome}</div>
        <div class="cartaz-passos">Doçura · Corpo · Harmonização · e mais</div>
        <div class="baixar"><a download="qr-${slug}.png" href="${dataUrl}">⬇️ Baixar este QR (PNG)</a></div>
      `;
      container.appendChild(card);
    });
  </script>
</body>
</html>
